name: UPI Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          java-version: "11"
          distribution: "temurin"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyspark==3.5.1 pandas pyarrow faker pytest pytest-mock pyyaml ruff

      - name: Lint with ruff
        run: |
          ruff check src/ --ignore E501

      - name: Run tests
        run: |
          pytest tests/ -v